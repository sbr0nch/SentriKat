name: Publish sentrikat-scan to PyPI

# Trigger on tag pushes that look like `sentrikat-scan-v1.2.3`. This is
# intentionally a separate tag namespace from the main product release tag
# (handled by release.yml) so we can publish the scanner client on its own
# cadence without forcing a full product release.
#
# Manual-dispatch trigger is also allowed so you can test the workflow
# against TestPyPI without creating a real tag.
on:
  push:
    tags:
      - 'sentrikat-scan-v*'
  workflow_dispatch:
    inputs:
      target:
        description: 'Where to publish'
        required: true
        default: 'testpypi'
        type: choice
        options:
          - testpypi
          - pypi

# Trusted Publishing (PEP 740) requires id-token: write so PyPI can verify
# the OIDC token the runner presents. No long-lived API token is ever
# stored as a GitHub secret — PyPI matches the request against the
# Trusted Publisher config registered on pypi.org/manage/account/publishing/.
permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build package
        run: |
          cd packaging/sentrikat-scan
          ./build.sh

      - name: Upload built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sentrikat-scan-dist
          path: packaging/sentrikat-scan/dist/*
          if-no-files-found: error
          retention-days: 7

  publish-testpypi:
    name: Publish to TestPyPI (dry run)
    needs: build
    runs-on: ubuntu-latest
    # Run on manual dispatch when target=testpypi, OR automatically for every
    # tag push (so every real release is smoke-tested on TestPyPI first —
    # if it fails there, the subsequent PyPI job is skipped).
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi')
      || github.event_name == 'push'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/sentrikat-scan
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v8
        with:
          name: sentrikat-scan-dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          # TestPyPI sometimes has the version already (if you re-ran a
          # tag); skip rather than fail so the pipeline stays green.
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI
    needs: [build, publish-testpypi]
    runs-on: ubuntu-latest
    # Publish to real PyPI only on actual tag pushes, never on manual
    # dispatch. Protects against accidental releases from a `workflow_dispatch`
    # click in the GitHub UI.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/sentrikat-scan-v')
    environment:
      name: pypi
      url: https://pypi.org/p/sentrikat-scan
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v8
        with:
          name: sentrikat-scan-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
