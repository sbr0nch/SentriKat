{% extends "base.html" %}

{% block title %}{{ status_code }} - {{ branding.app_name }}{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6 text-center">
      <div class="mb-4">
        <i class="bi {{ icon }} text-{{ tone }}" style="font-size: 5rem;"></i>
      </div>
      <h1 class="display-3 fw-bold text-{{ tone }} mb-2">{{ status_code }}</h1>
      <h2 class="h4 mb-3">{{ heading }}</h2>
      <p class="lead text-muted mb-4">{{ message }}</p>
      <div class="d-flex justify-content-center gap-2">
        <a href="/" class="btn btn-primary">
          <i class="bi bi-house me-1"></i>Back to Dashboard
        </a>
        <a href="javascript:history.back()" class="btn btn-outline-secondary">
          <i class="bi bi-arrow-left me-1"></i>Go Back
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
